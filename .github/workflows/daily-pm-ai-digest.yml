# Daily PM + AI inbox digest via Gmail API + OpenAI.
# Requires repo secrets (see scripts/gh_digest/SETUP.txt).
name: Daily PM + AI digest

on:
  schedule:
    # 9:00 America/Chicago ≈ 14:00 UTC (CDT) or 15:00 UTC (CST); both fire daily — script runs only at local 9:00.
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run now (ignore 9am Chicago gate). For testing."
        type: boolean
        default: false

concurrency:
  group: pm-ai-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/gh_digest/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/gh_digest/requirements.txt

      - name: Run digest
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          DIGEST_DRY_RUN: ${{ vars.DIGEST_DRY_RUN }}
          DIGEST_FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true' && '1' || '' }}
        run: python scripts/gh_digest/run_digest.py
